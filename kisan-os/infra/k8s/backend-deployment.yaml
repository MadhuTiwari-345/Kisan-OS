apiVersion: apps/v1
kind: Deployment
metadata:
  name: kisan-os-backend
  labels:
    app: kisan-os
    component: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: kisan-os
      component: backend
  template:
    metadata:
      labels:
        app: kisan-os
        component: backend
    spec:
      containers:
      - name: backend
        image: kisan-os/backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: kisan-os-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: kisan-os-config
              key: redis-url
        - name: BHASHINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: kisan-os-secrets
              key: bhashini-api-key
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: kisan-os-backend-svc
spec:
  selector:
    app: kisan-os
    component: backend
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP

