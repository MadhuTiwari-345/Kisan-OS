apiVersion: apps/v1
kind: Deployment
metadata:
  name: kisan-os-frontend
  labels:
    app: kisan-os
    component: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: kisan-os
      component: frontend
  template:
    metadata:
      labels:
        app: kisan-os
        component: frontend
    spec:
      containers:
      - name: frontend
        image: kisan-os/frontend:latest
        ports:
        - containerPort: 3000
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "https://api.kisan-os.in"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 20
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: kisan-os-frontend-svc
spec:
  selector:
    app: kisan-os
    component: frontend
  ports:
  - port: 80
    targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kisan-os-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
  - hosts:
    - kisan-os.in
    - api.kisan-os.in
    secretName: kisan-os-tls
  rules:
  - host: kisan-os.in
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: kisan-os-frontend-svc
            port:
              number: 80
  - host: api.kisan-os.in
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: kisan-os-backend-svc
            port:
              number: 8000

